<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble World - Worldbuilding Organization App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-force-graph-2d@1.25.4/dist/react-force-graph-2d.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1 class="app-title">Bubble World</h1>
            <div class="view-toggle">
                <button id="tabsViewBtn" class="toggle-btn active">Tabs View</button>
                <button id="bubbleViewBtn" class="toggle-btn">Bubble Map</button>
            </div>
        </header>

        <!-- Tabs View -->
        <div id="tabsView" class="view-container">
            <div class="tabs-sidebar">
                <div class="tabs-header">
                    <h2>World Topics</h2>
                    <button id="addPageBtn" class="add-btn">+ Add Page</button>
                </div>
                <div id="pagesList" class="pages-list"></div>
            </div>
            <div class="content-area">
                <div id="pageContent" class="page-content">
                    <div class="welcome-message">
                        <h2>Welcome to Bubble World</h2>
                        <p>Select a page from the sidebar or create a new one to start building your world.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bubble Map View -->
        <div id="bubbleView" class="view-container hidden">
            <div class="bubble-controls">
                <h2>World Connection Map</h2>
                <div class="layer-controls">
                    <button id="mainLayerBtn" class="layer-btn active">Main Topics</button>
                    <button id="subLayerBtn" class="layer-btn">Subsections</button>
                </div>
                <div class="zoom-controls">
                    <button id="zoomInBtn">+</button>
                    <button id="zoomOutBtn">-</button>
                    <button id="resetZoomBtn">Reset</button>
                </div>
            </div>
            <div id="bubbleGraph" class="bubble-graph"></div>
        </div>
    </div>

    <!-- Modal for adding/editing pages -->
    <div id="pageModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Page</h3>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="pageForm">
                    <div class="form-group">
                        <label for="pageTitle">Page Title</label>
                        <input type="text" id="pageTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="pageContent">Content</label>
                        <textarea id="pageContent" rows="10" placeholder="Write your worldbuilding ideas here..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Connected Pages</label>
                        <div id="connectionsList" class="connections-list"></div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Page</button>
                        <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
